name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # ブラウザ用の公開値（anon/publishable）。公開して安全。
          VITE_SUPABASE_URL: https://eikjognegxcvvwuqeovz.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_bkh9T0970eCRYR2chIkZ9A_Z52KizCE
      - name: SPA fallback (client routing)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
